// Solver gRPC service definition for GTO Wizard
// Uses proto3 syntax for all messages and services

syntax = "proto3";

package solver;

// ============== Common Messages ==============

// Represents a single action in a strategy with frequency and EV
message StrategyAction {
    string action = 1;      // Action name (check, call, raise, fold, etc.)
    double frequency = 2;    // Probability of taking this action (0.0-1.0)
    double ev = 3;          // Expected value of this action
}

// ============== Solve Messages ==============

// Request message for submitting a GTO solve job
message SolveRequest {
    string game_type = 1;    // Game type: "nlh", "plo", etc. (default: "nlh")
    int32 players = 2;       // Number of players (default: 2)
    string board = 3;        // Board cards (e.g., "Kd7h2c")
    int32 pot_size = 4;      // Current pot size in chips
    int32 stack_depth = 5;   // Stack depth in big blinds
    repeated float bet_sizes = 6;  // Available bet sizes as fraction of pot
    int32 iterations = 7;    // Number of CFR iterations (default: 1000)
    string street = 8;       // Street: "preflop", "flop", "turn", "river"
    string position = 9;    // Position to solve for (e.g., "BTN", "SB")
}

// Response message for solve operations
message SolveResponse {
    string job_id = 1;       // Unique job identifier
    string status = 2;       // Status: "submitted", "running", "complete", "error"
    int32 progress = 3;      // Progress percentage (0-100)
    repeated StrategyAction strategy = 4;  // Computed strategy actions
    string strategy_key = 5; // Key to retrieve full strategy
    string error = 6;        // Error message if status is "error"
}

// ============== ICM Messages ==============

// Request message for ICM calculation
message ICMRequest {
    repeated int32 stacks = 1;      // Player stack sizes in chips
    repeated float prizes = 2;      // Prize amounts for each position
    float prize_pool = 3;           // Total prize pool (default: 1.0)
    int32 n_simulations = 4;        // Number of Monte Carlo simulations (default: 100000)
}

// ICM calculation result for a single player
message ICMResult {
    string player = 1;             // Player identifier or position
    double equity = 2;              // ICM equity (probability of finishing first)
    double chip_equity = 3;         // Chip equity (expected share of chips)
    double bubble_factor = 4;       // Bubble factor (>1.0 means pressure)
    double ev = 5;                  // Expected value in prize units
}

// Response message for ICM calculations
message ICMResponse {
    repeated ICMResult results = 1;     // ICM results for each player
    float total_prize_pool = 2;         // Total prize pool used in calculation
}

// Request for ICM analysis of a push/fold spot
message ICMSpotRequest {
    repeated int32 stacks = 1;      // Player stack sizes
    float prize_pool = 2;           // Total prize pool (default: 1.0)
    int32 position = 3;             // Position index of player in question
    string hand = 4;                // Hand cards (e.g., "AA", "AKs")
    repeated float prizes = 5;      // Prize structure (optional, uses standard if not provided)
}

// Response for ICM analysis of a push/fold spot
message ICMSpotResponse {
    repeated double equities = 1;         // ICM equities for all players
    repeated double bubble_factors = 2;   // Bubble factors for all players
    repeated double chip_equities = 3;     // Chip equities for all players
    repeated int32 stacks = 4;            // Stack sizes
    repeated float prizes = 5;            // Prize structure used
    bool is_icm_spot = 6;                  // True if this is a bubble factor spot (>1.05)
    double recommended_action_ev = 7;      // EV of recommended action
    string recommendation = 8;             // "push", "fold", or "call"
}

// ============== Strategy Messages ==============

// Request message for retrieving a GTO strategy
message GetStrategyRequest {
    string game_type = 1;    // Game type (default: "nlh")
    string board = 2;        // Board cards
    int32 stack_depth = 3;   // Stack depth in big blinds
    repeated float bet_sizes = 4;  // Bet sizes used
    string street = 5;       // Street: "preflop", "flop", "turn", "river"
    int32 players = 6;       // Number of players
    string position = 7;      // Position (e.g., "BTN", "SB", "BB")
    string strategy_key = 8; // Optional: specific strategy key to retrieve
}

// Response message for strategy retrieval
message GetStrategyResponse {
    string strategy_data = 1;   // JSON string containing strategy data
    string status = 2;           // "found", "not_found", "generating", "error"
    string key = 3;              // Strategy key
    string created_at = 4;       // Creation timestamp (ISO format)
    string error = 5;            // Error message if status is "error"
}

// Request message for listing strategies
message ListStrategiesRequest {
    string game_type = 1;    // Filter by game type
    int32 players = 2;        // Filter by number of players (0 = any)
    string board = 3;        // Filter by board
    string street = 4;        // Filter by street
    int32 limit = 5;         // Maximum results (default: 100)
    int32 offset = 6;         // Offset for pagination
}

// Summary of a stored strategy
message StrategySummary {
    string key = 1;          // Strategy unique key
    string game_type = 2;    // Game type
    int32 players = 3;       // Number of players
    string street = 4;        // Street (preflop, flop, turn, river)
    string board_hash = 5;   // Hash of board cards
    float bet_size = 6;      // Bet size used
    int32 stack_depth = 7;   // Stack depth
    string created_at = 8;   // Creation timestamp
    string updated_at = 9;   // Last update timestamp
    int64 size_bytes = 10;   // Size of strategy data in bytes
}

// Response message for listing strategies
message ListStrategiesResponse {
    repeated StrategySummary strategies = 1;  // List of strategy summaries
    int32 total = 2;                          // Total number of matching strategies
    string status = 3;                        // "ok" or "error"
}

// ============== Progress Messages ==============

// Progress update message for streaming
message ProgressUpdate {
    string job_id = 1;        // Job identifier
    int32 progress = 2;       // Progress percentage (0-100)
    string status = 3;        // Status: "running", "complete", "error"
    string stage = 4;          // Current stage: "initializing", "solving", "converging", "complete"
    int32 iteration = 5;       // Current iteration number
    int32 total_iterations = 6; // Total iterations to run
    double timestamp = 7;      // Unix timestamp of update
    string error = 8;         // Error message if status is "error"
    map<string, string> metadata = 9;  // Additional metadata
}

// ============== Health Messages ==============

// Health check request
message HealthRequest {
    string service = 1;  // Service name to check
}

// Health check response
message HealthResponse {
    bool healthy = 1;           // Whether service is healthy
    string status = 2;           // Status message
    map<string, string> details = 3;  // Additional details
}

// ============== Services ==============

// Main solver service for GTO poker calculations
service SolverService {
    // Submit a new solve job (synchronous response)
    rpc SubmitSolve(SolveRequest) returns (SolveResponse);

    // Get the status of a solve job
    rpc GetSolveStatus(SolveRequest) returns (SolveResponse);

    // Get solve results including computed strategy
    rpc GetSolveResults(SolveRequest) returns (SolveResponse);

    // Calculate ICM equity for tournament players
    rpc CalculateICM(ICMRequest) returns (ICMResponse);

    // Get ICM-adjusted recommendation for a push/fold spot
    rpc GetICMForSpot(ICMSpotRequest) returns (ICMSpotResponse);

    // Get a GTO strategy by parameters
    rpc GetStrategy(GetStrategyRequest) returns (GetStrategyResponse);

    // List stored strategies with optional filters
    rpc ListStrategies(ListStrategiesRequest) returns (ListStrategiesResponse);

    // Delete a stored strategy
    rpc DeleteStrategy(GetStrategyRequest) returns (GetStrategyResponse);

    // Stream progress updates for a solve job
    rpc StreamProgress(SolveRequest) returns (stream ProgressUpdate);

    // Health check endpoint
    rpc HealthCheck(HealthRequest) returns (HealthResponse);
}