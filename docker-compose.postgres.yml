# Optional bundled PostgreSQL — only if you do NOT have a local Postgres instance.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# WARNING: maps port 5432 on the host. Do NOT use this if local Postgres
# already listens on 5432 — pick one or the other.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gto_wizard
    networks:
      - gto-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gto_wizard

  worker:
    depends_on:
      postgres:
        condition: service_healthy

  solver:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gto_wizard

  seed:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gto_wizard

volumes:
  postgres-data:
