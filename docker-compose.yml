services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - gto-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gto_wizard
    networks:
      - gto-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - gto-network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gto_wizard
      REDIS_URL: redis://redis:6379/0

  solver:
    build:
      context: .
      dockerfile: apps/solver/Dockerfile
    ports:
      - "50051:50051"
    networks:
      - gto-network
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gto_wizard

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    networks:
      - gto-network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A apps.worker.celery_app worker --loglevel=info --concurrency=4

  solver:
    build:
      context: .
      dockerfile: apps/solver/Dockerfile
    ports:
      - "50051:50051"
    networks:
      - gto-network
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gto_wizard

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_GRPC_URL: grpc://solver:50051
    depends_on:
      - api
    networks:
      - gto-network
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev

networks:
  gto-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: