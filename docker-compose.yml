services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - gto-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - gto-network
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${PGUSER:-postgres}:${PGPASSWORD:-postgres}@host.docker.internal:${PGPORT:-5432}/${PGDATABASE:-gto_wizard}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    networks:
      - gto-network
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    command: celery -A apps.worker.celery_app worker --loglevel=info --concurrency=4

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_GRPC_URL: grpc://solver:50051
    depends_on:
      - api
    networks:
      - gto-network
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev

  solver:
    build:
      context: .
      dockerfile: apps/solver/Dockerfile
    ports:
      - "50051:50051"
    networks:
      - gto-network
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${PGUSER:-postgres}:${PGPASSWORD:-postgres}@host.docker.internal:${PGPORT:-5432}/${PGDATABASE:-gto_wizard}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${PGUSER:-postgres}:${PGPASSWORD:-postgres}@host.docker.internal:${PGPORT:-5432}/${PGDATABASE:-gto_wizard}
    command: python prisma/seed_all_strategies.py
    restart: "no"
    networks:
      - gto-network
    profiles:
      - seed

networks:
  gto-network:
    driver: bridge

volumes:
  redis-data:
