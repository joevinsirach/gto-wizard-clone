[tool.uv.workspace]
members = ["packages/poker-core"]

[dependency-groups]
runtime = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.9.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.29.0",
    "redis>=5.0.0",
    "python-socketio>=5.11.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "python-multipart>=0.0.9",
    "numpy>=1.26.0",
    "websockets>=14.0",
    "celery>=5.4.0",
    "grpcio>=1.60",
    "grpcio-tools>=1.60",
    "numba>=0.59.0",
    "phevaluator>=0.5.3.1",
    "pokerkit>=0.7.4",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[tool.pytest.ini_options]
testpaths = ["packages/poker-core/tests", "apps/solver/tests", "apps/api/tests"]
python_files = ["test_*.py"]
addopts = "-p no:cacheprovider"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.cibuildwheel]
build = "cp312-manylinux"
